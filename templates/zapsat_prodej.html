{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4 mt-2">
  <h2 class="mb-0 fw-bold text-dark">💰 Zapsat prodeje</h2>
  <a href="{{ url_for('prodeje') }}" class="btn btn-outline-secondary btn-sm">⬅️ Zpět na přehled</a>
</div>

<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card shadow-sm border-0 mb-4">
      <div class="card-header bg-success text-white py-3">
        <h5 class="mb-0 fw-bold fs-6">📝 Nový záznam o prodeji</h5>
      </div>
      <div class="card-body bg-light p-4">
        <form method="POST">
          
          {% if current_user.role in ['admin', 'Max'] %}
            <div class="row mb-3">
              <div class="col-sm-6 mb-3 mb-sm-0">
                <label for="uzivatel" class="form-label fw-bold text-muted small">👤 Uživatel</label>
                <select name="uzivatel" id="uzivatel" class="form-select shadow-none border-secondary-subtle" required>
                  {% for u in uzivatele %}
                    <option value="{{ u.username }}">{{ u.username }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="col-sm-6">
                <label for="mesic" class="form-label fw-bold text-muted small">📅 Měsíc</label>
                <select name="mesic" id="mesic" class="form-select shadow-none border-secondary-subtle">
                  {% for cislo, nazev in mesice %}
                    <option value="{{ cislo }}" {% if cislo == current_month %}selected{% endif %}>{{ nazev }}</option>
                  {% endfor %}
                </select>
              </div>
            </div>
            <hr class="text-secondary-subtle my-4">
          {% endif %}

          <div class="row mb-4">
            <div class="col-6">
              <label for="zkousky" class="form-label fw-bold text-muted small">👗 Počet zkoušek</label>
              <input type="number" name="zkousky" id="zkousky" class="form-control shadow-none border-info-subtle fs-4 text-center fw-bold text-info py-2" required min="0">
            </div>
            <div class="col-6">
              <label for="prodeje" class="form-label fw-bold text-muted small">🛍️ Počet prodejů</label>
              <input type="number" name="prodeje" id="prodeje" class="form-control shadow-none border-success-subtle fs-4 text-center fw-bold text-success py-2" required min="0">
            </div>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-success fw-bold py-2 shadow-sm">💾 Uložit záznam</button>
          </div>
          
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
