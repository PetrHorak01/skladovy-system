<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Skladový systém</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link rel="icon" 
      href="{{ url_for('static', filename='favicon.png') }}" 
      type="image/png">
<link rel="shortcut icon"
      href="{{ url_for('static', filename='favicon.png') }}"
      type="image/png">

</head>
<body class="bg-light">
  <div class="container mt-4">
    <div id="flash-messages-container" style="position: sticky; top: 20px; z-index: 1050;">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category if category!='message' else 'warning' }} alert-dismissible fade show shadow-sm" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Zavřít"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}
    </div>

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Nastavíme časovač na 3 sekundy (3000 ms)
      setTimeout(function() {
        let alerts = document.querySelectorAll('#flash-messages-container .alert');
        alerts.forEach(function(alert) {
          // Přidáme plynulý přechod a stáhneme průhlednost na nulu
          alert.style.transition = "opacity 0.6s ease-out";
          alert.style.opacity = "0";
          // Po dokončení animace (600 ms) prvek úplně odstraníme z dokumentu
          setTimeout(() => alert.remove(), 600);
        });
      }, 3000);
    });
  </script>
</body>
</html>
